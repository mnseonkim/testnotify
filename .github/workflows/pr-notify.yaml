name: PR Slack Notify

# ─────────────────────────────────────────────────────────────
# Required GitHub Repository Variables (Settings → Variables → Actions):
#
#   SLACK_REVIEWER_ID    → REVIEWER's Slack user ID (e.g. U0AJV6A54JU)
#   SLACK_TEAM_MEMBER_1  → Team member 1 Slack user ID (e.g. U1BCD123456)
#   SLACK_TEAM_MEMBER_2  → Team member 2 Slack user ID (e.g. U2EFG789012)
# ─────────────────────────────────────────────────────────────

on:
  pull_request:
    types: [opened, closed]

jobs:
  notify-opened:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification (PR Opened)
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "image",
                      "image_url": "${{ github.event.pull_request.user.avatar_url }}",
                      "alt_text": "${{ github.event.pull_request.user.login }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*<${{ github.event.pull_request.user.html_url }}|${{ github.event.pull_request.user.login }}>* opened a pull request"
                    }
                  ]
                }
              ],
              "attachments": [
                {
                  "color": "#0075ff",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}>*"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Reviewer*\n<@${{ vars.SLACK_REVIEWER_ID }}>"
                      }
                    }
                  ]
                }
              ]
            }

  notify-merged:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification (PR Merged)
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "image",
                      "image_url": "${{ github.event.pull_request.merged_by.avatar_url }}",
                      "alt_text": "${{ github.event.pull_request.merged_by.login }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*<${{ github.event.pull_request.merged_by.html_url }}|${{ github.event.pull_request.merged_by.login }}>* merged a pull request"
                    }
                  ]
                }
              ],
              "attachments": [
                {
                  "color": "#8250df",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}>*"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Pull required*\n<@${{ vars.SLACK_TEAM_MEMBER_1 }}> <@${{ vars.SLACK_TEAM_MEMBER_2 }}>"
                      }
                    }
                  ]
                }
              ]
            }

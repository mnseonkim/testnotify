name: PR Slack Notify

on:
  pull_request:
    types: [opened, closed]

jobs:
  notify-opened:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Prepare PR data
        id: vars
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          REVIEWERS_JSON: ${{ toJSON(github.event.pull_request.requested_reviewers) }}
        run: |
          body=$(echo "$PR_BODY" | \
            sed 's/\*\*\([^*]*\)\*\*/*\1*/g' | \
            sed 's/^- \[x\] /✅ /g' | \
            sed 's/^- \[ \] /☐ /g' | \
            sed 's/^- /• /g' | \
            sed 's/^\* /• /g' | \
            head -c 200 | \
            tr '\n\r' ' ' | \
            sed 's/  */ /g' | \
            sed 's/"/\\"/g')
          echo "body=${body:-(説明なし)}" >> $GITHUB_OUTPUT

          reviewers=$(echo "$REVIEWERS_JSON" | jq -r 'map("<https://github.com/\(.login)|@\(.login)>") | join(", ")')
          echo "reviewers=${reviewers:-(なし)}" >> $GITHUB_OUTPUT

      - name: Send Slack Notification (PR Opened)
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "image",
                      "image_url": "${{ github.event.pull_request.user.avatar_url }}",
                      "alt_text": "${{ github.event.pull_request.user.login }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "Pull request opened by *<${{ github.event.pull_request.user.html_url }}|${{ github.event.pull_request.user.login }}>*"
                    }
                  ]
                }
              ],
              "attachments": [
                {
                  "color": "#0075ff",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}>*"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ steps.vars.outputs.body }}"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Reviewers*\n<@U0AJV6A54JU>  ${{ steps.vars.outputs.reviewers }}"
                      }
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "Review"
                          },
                          "url": "${{ github.event.pull_request.html_url }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }

  notify-merged:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification (PR Merged)
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "image",
                      "image_url": "${{ github.event.pull_request.merged_by.avatar_url }}",
                      "alt_text": "${{ github.event.pull_request.merged_by.login }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "<@U0AJV6A54JU>  Pull request merged by *<${{ github.event.pull_request.merged_by.html_url }}|${{ github.event.pull_request.merged_by.login }}>*"
                    }
                  ]
                }
              ],
              "attachments": [
                {
                  "color": "#8250df",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}>*"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "`${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`"
                      }
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "View PR"
                          },
                          "url": "${{ github.event.pull_request.html_url }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }

name: PR Slack Notify

on:
  pull_request:
    types: [opened, closed]

jobs:
  notify-opened:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Prepare PR body
        id: vars
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          body=$(echo "$PR_BODY" | head -c 280 | tr '\n\r' '  ' | sed 's/"/\\"/g')
          echo "body=${body:-(説明なし)}" >> $GITHUB_OUTPUT

      - name: Send Slack Notification (PR Opened)
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<@U0AJV6A54JU>  *${{ github.event.pull_request.user.login }}* opened pull request <${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }}>"
                  }
                }
              ],
              "attachments": [
                {
                  "color": "#0075ff",
                  "blocks": [
                    {
                      "type": "context",
                      "elements": [
                        {
                          "type": "image",
                          "image_url": "${{ github.event.pull_request.user.avatar_url }}",
                          "alt_text": "${{ github.event.pull_request.user.login }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*${{ github.event.pull_request.user.login }}*"
                        }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*<${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>*\n`${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ steps.vars.outputs.body }}"
                      }
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "Review"
                          },
                          "url": "${{ github.event.pull_request.html_url }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }

  notify-merged:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification (PR Merged)
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<@U0AJV6A54JU> <@U0AJV6A54JU> <@U0AJV6A54JU>  *${{ github.event.pull_request.merged_by.login }}* merged pull request <${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }}>"
                  }
                }
              ],
              "attachments": [
                {
                  "color": "#8250df",
                  "blocks": [
                    {
                      "type": "context",
                      "elements": [
                        {
                          "type": "image",
                          "image_url": "${{ github.event.pull_request.merged_by.avatar_url }}",
                          "alt_text": "${{ github.event.pull_request.merged_by.login }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*${{ github.event.pull_request.merged_by.login }}*"
                        }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*<${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>*\n`${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`"
                      }
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "View PR"
                          },
                          "url": "${{ github.event.pull_request.html_url }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
